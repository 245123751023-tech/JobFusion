{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile - JobFusion</title>
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
<style>
  /* ---------------- Base ---------------- */
  body {
    background: radial-gradient(circle at 20% 30%, #0d1117 0%, #0a0c10 100%);
    color: #e6edf3;
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
  }

  a { color: #58a6ff; text-decoration: none; transition: color 0.2s ease; }
  a:hover { color: #79c0ff; }

  /* ---------------- Navbar ---------------- */
  .navbar { background: #0d1117; }
  .navbar .btn-outline-light {
    border-color: #58a6ff;
    color: #58a6ff;
    transition: all 0.2s ease;
  }
  .navbar .btn-outline-light:hover {
    background: #58a6ff;
    color: #0d1117;
  }

  /* ---------------- Form Card ---------------- */
  .card {
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 25px;
  }

  /* ---------------- Input & Textarea ---------------- */
  .form-control {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.3);
    color: #e6edf3;
    border-radius: 8px;
    transition: all 0.25s ease;
  }
  .form-control:focus,
  .form-control:hover {
    border-color: #0d6efd;
    box-shadow: 0 0 10px rgba(13,110,253,0.6);
    background: rgba(13,110,253,0.08);
    color: #fff;
  }
  textarea.form-control { resize: none; }

  /* ---------------- Labels ---------------- */
  .form-label { color: #9cd2ff; transition: color 0.2s ease; }
  .form-control:focus + .form-label,
  .form-control:hover + .form-label {
    color: #58a6ff;
  }

  /* ---------------- Buttons ---------------- */
  .btn-primary, .btn-outline-primary {
    border-radius: 8px;
    transition: all 0.2s ease;
  }
  .btn-primary { background-color: #0d6efd; border: none; }
  .btn-primary:hover { background-color: #0b5ed7; }
  .btn-outline-primary { border-color: #0d6efd; color: #0d6efd; }
  .btn-outline-primary:hover { background-color: #0d6efd; color: #fff; }

  /* ---------------- Headings ---------------- */
  h2, h5 { color: #f0f6fc; }

  /* ---------------- Responsive ---------------- */
  @media (max-width: 576px) { .card { padding: 20px; } }

</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">JOB-FUSION</a>
    <div class="d-flex">
      <a href="{% url 'home' %}" class="btn btn-outline-light">Back to Home</a>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h2 class="text-center fw-bold mb-4">Edit Profile</h2>
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <!-- Profile Picture -->
          <div class="mb-3">
            <label class="form-label">Profile Picture</label>
            <input type="file" class="form-control" name="profile_pic">
          </div>

          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" value="{{ user.username }}" disabled>
          </div>

          <!-- Full Name -->
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" value="{{ profile.full_name }}" name="full_name">
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ user.email }}" name="email">
          </div>

          <!-- LinkedIn URL -->
          <div class="mb-3">
            <label class="form-label">LinkedIn URL</label>
            <input type="url" class="form-control" value="{{ profile.liurl }}" name="liurl">
          </div>

          <!-- Phone -->
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" value="{{ profile.phone }}" name="phno">
          </div>

          <!-- Location -->
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" value="{{ profile.location }}" name="location">
          </div>

          <!-- Bio -->
          <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea class="form-control" name="bio" rows="2">{{ profile.bio }}</textarea>
          </div>

          <!-- Resume -->
          <div class="mb-3">
            <label class="form-label">Resume</label>
            <input type="file" class="form-control" name="resume">
          </div>

          <!-- Skills -->
          <div class="mb-3">
            <label class="form-label">Skills</label>
            <textarea class="form-control" name="skills" rows="3">{{ profile.skills }}</textarea>
          </div>

          <!-- Other Skills -->
          <div class="mb-3">
            <label class="form-label">Other Skills</label>
            <input type="text" class="form-control" value="{{ profile.otherskills }}" name="otherskills">
          </div>

          <!-- Experience -->
          <div class="mb-3">
            <label class="form-label">Experience (in years)</label>
            <input type="text" class="form-control" value="{{ profile.exp }}" name="exp">
          </div>

          <!-- Graduation / Intermediate / School / Company fields as before -->

          <button type="submit" class="btn btn-primary w-100 mt-3">Update Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
