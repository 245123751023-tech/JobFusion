{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ username }}</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        body {
    background: #f8f9fa;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Chat Header */
.chat-header {
    background: #0d6efd;
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* Title */
.chat-title {
    font-size: 18px;
    font-weight: 600;
}

/* Messages Area */
#messages {
    flex: 1;
    padding: 25px 70px;   /* ← Added left/right padding (fixes spacing) */
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: #e9ecef;
}

/* Message bubbles */
.msg {
    margin: 6px 0;
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 60%;         /* ← Reduced width for nicer bubbles */
    font-size: 15px;
    line-height: 1.6;
    word-wrap: break-word;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.me {
    background: #d1f8c6;
    align-self: flex-end;
    margin-right: 20px;     /* ← Pulls message inward */
    border-bottom-right-radius: 4px;
}

.other {
    background: #ffffff;
    align-self: flex-start;
    margin-left: 20px;      /* ← Pulls message inward */
    border-bottom-left-radius: 4px;
}

/* Input area */
#inputArea {
    padding: 10px 20px;      /* ← Adds left/right padding for balance */
    display: flex;
    gap: 10px;
    background: white;
    border-top: 1px solid #dee2e6;
}

#messageInput {
    flex: 1;
}

.msg button.delete-btn {
    display: inline-block;        /* keep it inline for transition */
    opacity: 0;                   /* hidden initially */
    margin-left: 5px;
    padding: 2px 4px;
    font-size: 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    transition: opacity 0.3s ease; /* smooth fade-in */
}

/* Show with fade-in when hovering over message */
.msg:hover button.delete-btn {
    opacity: 1;
}


    </style>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { update,getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9tkGAPHj-3bC8B3mXGfA-DYyifT4R168",
            authDomain: "fir-chat-e3c87.firebaseapp.com",
            databaseURL: "https://fir-chat-e3c87-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fir-chat-e3c87",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = "{{ request.user.username }}";
            const otherUser = "{{ username }}";
            const roomId = [currentUser, otherUser].sort().join("_");

            const messagesDiv = document.getElementById("messages");
            const messageInput = document.getElementById("messageInput");
            const sendBtn = document.getElementById("sendBtn");

            const messagesRef = ref(db, "chats/" + roomId);
            

            // Delete message function 

            function deleteMessage(messageId,user)
            {
                const messageRef = ref(db,'chats/'+roomId+'/'+messageId+'/deletedFor');
                const obj = {};
                obj[user] = true;

                update(messageRef,obj)
                    .then(()=>console.log("Message deleted..."))
                    .catch(err=>console.error(err));
            }

            // Load messages live
            onValue(messagesRef, (snapshot) => {
                messagesDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const msg = child.val();
                    if(msg.deletedFor && msg.deletedFor[currentUser]===true) return;

                    const div = document.createElement("div");
                    div.className = "msg " + (msg.sender === currentUser ? "me" : "other");
                    div.innerHTML = msg.text;

                    if(msg.sender===currentUser)
                    {   
                        const delBtn = document.createElement("button");
                        delBtn.textContent = "🗑️";
                        delBtn.className = "delete-btn";
                        delBtn.onclick=()=> deleteMessage(child.key,currentUser);
                        div.appendChild(delBtn);
                    }

                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });

            // Send message
            sendBtn.addEventListener("click", () => {
                const text = messageInput.value.trim();
                if (!text) return;

                push(messagesRef, {
                    sender: currentUser,
                    deletedFor:{
                        [currentUser]:false,
                        [otherUser]:false
                    },
                    text: text,
                    timestamp: Date.now()
                });

                messageInput.value = "";
            });

            // Enter to send
            messageInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    sendBtn.click();
                }
            });
        });
    </script>
</head>

<body>

<!-- Chat Header -->
<div class="chat-header">
    <a href="{% url 'chats' %}" class="btn btn-light btn-sm">← Chats</a>
    <div class="chat-title">Chat with {{ username }}</div>
    <div style="width:60px;"></div>
</div>

<!-- Messages -->
<div id="messages"></div>

<!-- Input Area -->
<div id="inputArea">
    <input type="text" id="messageInput" class="form-control" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn" class="btn btn-success px-4">Send</button>
</div>

</body>
</html>
