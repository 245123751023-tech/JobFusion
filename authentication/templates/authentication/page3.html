{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Info - JobFusion</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            color: white;
        }
        .btn-gradient {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 30px;
            transition: transform 0.2s ease-in-out;
        }
        .btn-gradient:hover {
            transform: scale(1.05);
            color: white;
        }
        input.form-control, select.form-select, textarea.form-control {
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .form-check-label {
            cursor: pointer;
        }
        .card-header {
            background: #0072ff;
            color: white;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="card-header text-center">
        <h2>Basic Information</h2>
    </div>
    {% if profile.Role != "HR" and profile.Role != "Manager" and profile.Role != "Recruiter" %}
    <form method="post" action="{% url 'page3' %}">
        {% csrf_token %}
        <!-- Skills checkboxes -->
        <h5>Skills</h5>
        <div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Python">
    <label class="form-check-label">Python</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="JavaScript">
    <label class="form-check-label">JavaScript</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="UI Design">
    <label class="form-check-label">UI Design</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="HTML">
    <label class="form-check-label">HTML</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="CSS">
    <label class="form-check-label">CSS</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="React">
    <label class="form-check-label">React</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Node.js">
    <label class="form-check-label">Node.js</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Django">
    <label class="form-check-label">Django</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Flask">
    <label class="form-check-label">Flask</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="SQL">
    <label class="form-check-label">SQL</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="MongoDB">
    <label class="form-check-label">MongoDB</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="AWS">
    <label class="form-check-label">AWS</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Git">
    <label class="form-check-label">Git</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Docker">
    <label class="form-check-label">Docker</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Kubernetes">
    <label class="form-check-label">Kubernetes</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Machine Learning">
    <label class="form-check-label">Machine Learning</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="Data Analysis">
    <label class="form-check-label">Data Analysis</label>
</div>
<div class="form-check">
    <input class="form-check-input" type="checkbox" name="skills" value="DevOps">
    <label class="form-check-label">DevOps</label>
</div>


        <div class="mb-3">
            <label>Other Skills</label>
            <textarea class="form-control" name="otherskills" rows="2" required></textarea>
        </div>
        <!-- Graduation -->
        <h5>Graduation Details</h5>
        <input type="text" class="form-control" name="gclg" placeholder="College Name" required>
        <div class="row mb-2">
            <div class="col"><input type="date" class="form-control" name="gstartingyear" required></div>
            <div class="col"><input type="date" class="form-control" name="gendingyear" required></div>
        </div>
        <input type="text" class="form-control" name="gbranch" placeholder="Branch" required>
        <input type="text" class="form-control" name="gcgpa" placeholder="CGPA/Percentage" required>
        <textarea class="form-control" name="gclgadd" rows="2" placeholder="College Address"></textarea>
        <!-- Intermediate -->
        <h5>Intermediate Details</h5>
        <input type="text" class="form-control" name="iclg" placeholder="College Name" required>
        <div class="row mb-2">
            <div class="col"><input type="date" class="form-control" name="istartingyear" required></div>
            <div class="col"><input type="date" class="form-control" name="iendingyear" required></div>
        </div>
        <select class="form-select mb-2" name="ibranch" required>
            <option value="MPC">MPC</option>
            <option value="BIPC">BiPC</option>
            <option value="MEC">MEC</option>
            <option value="CEC">CEC</option>
        </select>
        <input type="text" class="form-control" name="imarks" placeholder="Marks" required>
        <!-- SSC -->
        <h5>SSC Details</h5>
        <input type="text" class="form-control" name="schoolname" placeholder="School/Institution" required>
        <input type="text" class="form-control" name="sscyear" placeholder="Year Passed" required>

        <button type="submit" class="btn btn-gradient w-100 mt-3">Next →</button>
    </form>
    {% else %}
    <form method="post" action="{% url 'page3' %}">
        {% csrf_token %}
        <input type="text" class="form-control mb-2" name="cname" placeholder="Company Name" required>
        <input type="text" class="form-control mb-2" name="industry" placeholder="Industry">
        <textarea class="form-control mb-2" name="cadd" rows="2" placeholder="Location"></textarea>
        <input type="text" class="form-control mb-2" name="hiringneeds" placeholder="Hiring Needs">
        <input type="email" class="form-control mb-2" name="cemail" placeholder="Organization Email">
        <button type="submit" class="btn btn-gradient w-100 mt-3">Next →</button>
    </form>
    {% endif %}
</div>
</body>
</html>
