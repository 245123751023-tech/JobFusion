{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Profile Pic - JobFusion</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            color: white;
        }
        .btn-gradient {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 30px;
            transition: transform 0.2s ease-in-out;
        }
        .btn-gradient:hover {
            transform: scale(1.05);
            color: white;
        }
        input.form-control {
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .card-header {
            background: #0072ff;
            color: white;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="card-header text-center"><h2>Upload Profile Picture</h2></div>
    <form method="post" action="{% url 'page4' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" class="form-control" name="profilepic" accept="image/*" required>
        <div class="card-header text-center"><h2>LinkedIn URL</h2></div>
        <input type="url" class="form-control" name="liurl" placeholder="Optional">
        <button type="submit" class="btn btn-gradient w-100 mt-3">Proceed to Main Page →</button>
    </form>
</div>
</body>
</html>
