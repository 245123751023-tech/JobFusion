{% load static %}
<html lang="en">
<head>
    <title>Login - JobFusion</title>
    <!-- Bootstrap CSS -->
    <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 2rem;
            color: white;
        }
        .btn-gradient {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            transition: transform 0.2s ease-in-out;
        }
        .btn-gradient:hover {
            transform: scale(1.05);
            color: white;
        }
        .form-label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <br><br><br>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="glass-card text-center">
                <h2 class="fw-bold mb-4">Login</h2>
                <form method="POST" action="/login/">
                    {% csrf_token %}
                    
                    <div class="mb-3 text-start">
                        <label for="username" class="form-label">Username:</label>
                        {%if username%}
                            <input type="text" name="username" value="{{username}}" id="username" class="form-control" required maxlength="15" minlength="5">
                        {% else %}
                            <input type="text" name="username"  id="username" class="form-control" required maxlength="15" minlength="5">    
                        {%endif%}
                    </div>

                    <div class="mb-3 text-start">
                        <label for="password" class="form-label">Password:</label>
                        <input type="password" name="password" value="{{request.session.raw_pwd}}" id="password" class="form-control" required maxlength="15" minlength="5">
                    </div>

                    {% if messages %}
                        {% for i in messages %}
                            <p class="text-danger fw-bold">{{ i }}</p>
                        {% endfor %}
                    {% endif %}

                    <button type="submit" class="btn btn-gradient w-100">LOG-IN</button>
                </form>

                <div class="mt-3">
                    <a href="fpassword.html" target="_blank" class="text-info fw-bold">Forgot Password?</a><br>
                    <a href="{% url 'signup' %}" class="text-light">New User? Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
