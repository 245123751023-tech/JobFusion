{% load static %}
<html>
<head>
    <title>Roles Selection: JobFusion</title>
    <link href="{% static 'css/bootstrap.min.css'%}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            font-family: "Inter", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
        }

        h1, h4 {
            color: #58a6ff;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            transition: transform 0.2s ease-in-out;
            border-radius: 30px;
        }

        .btn-gradient:hover {
            transform: scale(1.05);
            color: white;
        }

        .form-check-label {
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 class="fw-bold mb-4">JOB-FUSION</h1>
        <h4 class="mb-4">Select Your Role</h4>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="Manager" id="manager">
                <label class="form-check-label" for="manager">Manager</label>
            </div>
            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="HR" id="hr">
                <label class="form-check-label" for="hr">HR</label>
            </div>
            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="Recruiter" id="recruiter">
                <label class="form-check-label" for="recruiter">Recruiter</label>
            </div>
            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="Employee" id="employee">
                <label class="form-check-label" for="employee">Employee</label>
            </div>
            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="Freelancer" id="freelancer">
                <label class="form-check-label" for="freelancer">Freelancer</label>
            </div>
            <div class="form-check text-start mb-2">
                <input class="form-check-input" type="radio" name="choice" value="Intern" id="intern">
                <label class="form-check-label" for="intern">Intern</label>
            </div>
            <div class="form-check text-start mb-4">
                <input class="form-check-input" type="radio" name="choice" value="Student" id="student">
                <label class="form-check-label" for="student">Student</label>
            </div>

            <button type="submit" class="btn btn-gradient w-100">NEXT ➡</button>
        </form>
    </div>

</body>
</html>
